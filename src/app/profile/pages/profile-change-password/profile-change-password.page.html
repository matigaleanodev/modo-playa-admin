<ion-header class="app-page-header">
  <ion-toolbar class="app-page-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button menu="admin-main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>Cambiar contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="password-page">
    <section class="profile-card">
      <header class="panel-head">
        <h1>Cambiar contraseña</h1>
        <p>Actualizá la contraseña del usuario autenticado. Se renovará la sesión al guardar.</p>
      </header>

      @if (formError()) {
        <app-feedback-panel
          title="No pudimos actualizar la contraseña"
          [description]="formError()"
          tone="danger"
          [compact]="true"
        />
      }

      <form class="password-form" [formGroup]="form" (ngSubmit)="submit()">
        <label class="password-form__field">
          <span>Contraseña actual</span>
          <input type="password" formControlName="currentPassword" autocomplete="current-password" />
          @if (
            form.controls.currentPassword.invalid &&
            (form.controls.currentPassword.touched || form.controls.currentPassword.dirty)
          ) {
            <small>Mínimo 8 caracteres.</small>
          }
        </label>

        <label class="password-form__field">
          <span>Nueva contraseña</span>
          <input type="password" formControlName="newPassword" autocomplete="new-password" />
          @if (
            form.controls.newPassword.invalid &&
            (form.controls.newPassword.touched || form.controls.newPassword.dirty)
          ) {
            <small>Mínimo 8 caracteres.</small>
          }
        </label>

        <label class="password-form__field">
          <span>Confirmar nueva contraseña</span>
          <input type="password" formControlName="confirmNewPassword" autocomplete="new-password" />
          @if (
            form.controls.confirmNewPassword.invalid &&
            (form.controls.confirmNewPassword.touched || form.controls.confirmNewPassword.dirty)
          ) {
            <small>Mínimo 8 caracteres.</small>
          } @else if (hasPasswordMismatch()) {
            <small>La confirmación no coincide con la nueva contraseña.</small>
          }
        </label>

        <div class="password-form__actions">
          <button
            type="button"
            class="profile-btn profile-btn--secondary"
            [disabled]="saving()"
            (click)="cancel()"
          >
            Cancelar
          </button>
          <button type="submit" class="profile-btn profile-btn--primary" [disabled]="saving()">
            {{ saving() ? 'Guardando...' : 'Actualizar contraseña' }}
          </button>
        </div>
      </form>
    </section>
  </div>
</ion-content>

<ion-footer class="app-page-footer">
  <ion-toolbar class="app-page-toolbar">
    <div class="app-page-footer-note">Modo Playa App</div>
  </ion-toolbar>
</ion-footer>
