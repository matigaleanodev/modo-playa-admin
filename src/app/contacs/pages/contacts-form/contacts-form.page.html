<ion-header class="app-page-header">
  <ion-toolbar class="app-page-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button menu="admin-main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ pageTitle() }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="contacts-form-page">
    <section class="contacts-form-panel">
      <form class="contacts-form" (submit)="onSubmit($event)">
        <app-form-field-render [form]="form" [fields]="fields" />

        <div class="contacts-form__actions">
          <ion-button
            class="contacts-form__btn contacts-form__btn--secondary"
            type="button"
            fill="solid"
            color="medium"
            [disabled]="isSubmitting()"
            (click)="cancelar()"
          >
            Cancelar
          </ion-button>

          <ion-button
            class="contacts-form__btn contacts-form__btn--primary"
            type="submit"
            [disabled]="isSubmitting()"
          >
            @if (isSubmitting()) {
              <ion-spinner name="crescent"></ion-spinner>
            } @else {
              {{ submitLabel() }}
            }
          </ion-button>
        </div>
      </form>
    </section>
  </div>
</ion-content>

<ion-footer class="app-page-footer">
  <ion-toolbar class="app-page-toolbar">
    <div class="app-page-footer-note">Modo Playa App</div>
  </ion-toolbar>
</ion-footer>
