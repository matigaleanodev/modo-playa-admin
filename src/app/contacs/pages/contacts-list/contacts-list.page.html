<ion-header class="app-page-header">
  <ion-toolbar class="app-page-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button menu="admin-main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>Contactos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="contacts-list-page">
    <app-list-shell
      [items]="resource.items()"
      [loading]="resource.loading()"
      [error]="resource.error()"
      [page]="resource.page()"
      [limit]="resource.limit()"
      [total]="resource.total()"
      [createLabel]="'Nuevo'"
      [emptyState]="{
        title: 'Todavía no hay contactos',
        description: 'Crea contactos para asociarlos a los alojamientos.'
      }"
      [itemTemplate]="contactItemTpl"
      (create)="newElement()"
      (refresh)="onRefresh()"
      (pageChange)="onPageChange($event.page)"
      (limitChange)="onLimitChange($event.limit)"
      (edit)="editElement($event.item)"
      (delete)="onDelete($event.item)"
    />

    <ng-template #contactItemTpl let-item="item">
      <div class="contact-card">
        <header class="contact-card__header">
          <h3>{{ item.name }}</h3>
          @if (item.isDefault) {
            <span class="contact-card__badge">Predeterminado</span>
          }
        </header>

        <p class="contact-card__line">{{ item.email || 'Sin email' }}</p>
        <p class="contact-card__line">{{ item.whatsapp || 'Sin WhatsApp' }}</p>

        @if (item.notes) {
          <p class="contact-card__notes">{{ item.notes }}</p>
        }
      </div>
    </ng-template>
  </div>
</ion-content>

<ion-footer class="app-page-footer">
  <ion-toolbar class="app-page-toolbar">
    <div class="app-page-footer-note">Modo Playa App</div>
  </ion-toolbar>
</ion-footer>
