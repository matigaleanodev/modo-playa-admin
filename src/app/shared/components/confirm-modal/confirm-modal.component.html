<ion-header class="modal-header">
  <ion-toolbar>
    <ion-title>
      {{ title }}
    </ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="modal-close" (click)="cancel()">
        <ion-icon name="close" />
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<div class="confirm-modal">
  <div class="confirm-modal__body">
    @if (showIcon) {
      <div class="confirm-modal__icon-wrap">
        <ion-icon name="alert-circle-outline" class="modal-icon" />
      </div>
    }

    <div class="confirm-modal__copy">
      <p class="confirm-modal__eyebrow">Acción irreversible</p>
      <p class="modal-text">
        {{ bodyText }}
      </p>
    </div>

    <div class="footer-buttons">
      <button
        type="button"
        class="confirm-modal__button confirm-modal__button--secondary"
        (click)="cancel()"
      >
        {{ cancelLabel }}
      </button>

      <button
        type="button"
        class="confirm-modal__button"
        [class.confirm-modal__button--danger]="color === 'danger'"
        [class.confirm-modal__button--warning]="color === 'warning'"
        [class.confirm-modal__button--primary]="color === 'primary'"
        (click)="onConfirm()"
      >
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
